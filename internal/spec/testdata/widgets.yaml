---
openapi: "3.0.3"
info:
  title: Widgets API
  version: "1"
paths:
  /api/v1/widgets/:
    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                size:
                  type: integer
      responses:
        "201":
          description: Created
  /api/v1/widgets/{id}/:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  size:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                    readOnly: true
    patch:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                size:
                  type: integer
      responses:
        "200":
          description: OK
    delete:
      responses:
        "204":
          description: No Content
...
